version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.collab
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/memory_console_test
      - NODE_ENV=production
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=memory_console_test
    ports:
      - "5435:5432"
    volumes:
      - postgres_test:/var/lib/postgresql/data

volumes:
  postgres_test:
