version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_TOKEN=${API_TOKEN:-dev-token-1234567890abcdef}
      - NEXT_PUBLIC_API_TOKEN=${API_TOKEN:-dev-token-1234567890abcdef}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/memory_console
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-bge-m3}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma:ro
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        HOME=/tmp npm_config_cache=/tmp npx prisma@5.22.0 db push --accept-data-loss --skip-generate &&
        echo 'Running vector index migration...' &&
        HOME=/tmp npx prisma@5.22.0 migrate deploy --skip-generate || true &&
        echo 'Starting application...' &&
        node server.js
      "
    networks:
      - memory-network

  db:
    image: pgvector/pgvector:pg16
    container_name: memory-console-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory_console
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c 'shared_buffers=256MB'
      -c 'max_connections=200'
    networks:
      - memory-network

  ollama:
    image: ollama/ollama:latest
    container_name: memory-console-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - memory-network
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  memory-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
