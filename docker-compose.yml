version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_TOKEN=${NEXT_PUBLIC_API_TOKEN:-dev-token-1234567890abcdef}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/memory_console
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma:ro
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        HOME=/tmp npm_config_cache=/tmp npx prisma@5.22.0 db push --accept-data-loss --skip-generate &&
        echo 'Starting application...' &&
        node server.js
      "

  db:
    image: pgvector/pgvector:pg16
    container_name: memory-console-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory_console
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c 'shared_buffers=256MB'
      -c 'max_connections=200'

volumes:
  postgres-data:
    driver: local
